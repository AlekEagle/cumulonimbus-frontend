      function randomToiletImage() {
        const randomToilet =
          toilets[Math.floor(Math.random() * toilets.length)];

        const img = document.getElementById('toilet-image');
        img.src =
          'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'; // Clear the image while loading the new one
        img.src = 'https://toilets.pics' + randomToilet;
      }

      function toggleSlideshow() {
        if (slideshowTimer) {
          clearInterval(slideshowTimer);
          slideshowButton.textContent = '▶️';
          slideshowTimer = null;
        } else {
          randomToiletImage(); // Show a new image immediately
          slideshowButton.textContent = '⏸️';
          slideshowTimer = setInterval(randomToiletImage, slideshowInterval);
        }
      }

      function toggleMusic() {
        const music = document.getElementById('background-music');
        if (music.paused) {
          music.play();
          musicButton.textContent = '🔊';
        } else {
          music.pause();
          musicButton.textContent = '🔇';
        }
      }

      function init() {
        slideshowButton = document.getElementById('slideshow-button');
        musicButton = document.getElementById('music-button');
        refreshButton = document.getElementById('refresh-button');
        slideshowButton.onclick = toggleSlideshow;
        musicButton.onclick = toggleMusic;
        refreshButton.onclick = randomToiletImage;

        document.getElementById('slideshow-duration').oninput = function () {
          slideshowInterval = parseInt(this.value);
          if (slideshowTimer) {
            clearInterval(slideshowTimer);
            slideshowTimer = setInterval(randomToiletImage, slideshowInterval);
          }
          document.getElementById('slideshow-duration-value').textContent =
            slideshowInterval / 1000;
        };

        // Load background music source audio so it can be played when the user clicks the music button
        const music = document.getElementById('background-music');
        music.src = 'https://toilets.pics/Yjl69sPg72.m4a';
        randomToiletImage(); // Show an initial image
      }

      window.onload = init;
